name: Sync, certify and deploy AI Studio GHRAB

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [app-updated, app_manifest_updated, school-apps-updated]
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ai-studio-pages
  cancel-in-progress: false

jobs:
  qa-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        timeout-minutes: 4
        run: npm ci --no-audit --no-fund
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
      - name: Synchronise application manifests
        if: github.event_name != 'pull_request'
        run: npm run sync
      - name: Format generated registry files
        if: github.event_name != 'pull_request'
        run: npx prettier --write src/config/apps.generated.json src/config/sync-report.json
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run GHRAB QA release gate
        run: npm run qa:release
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghrab-qa-${{ github.sha }}
          path: qa-results
      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: qa-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
