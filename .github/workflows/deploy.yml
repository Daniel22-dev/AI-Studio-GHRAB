name: Sync, validate and deploy AI Studio GHRAB

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [app-updated, app_manifest_updated, school-apps-updated]
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ai-studio-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        timeout-minutes: 4
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        run: npm ci --no-audit --no-fund
      - name: Synchronise application manifests
        timeout-minutes: 3
        run: npm run sync
      - name: Validate and build
        timeout-minutes: 5
        run: npm test
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
