name: Sync, certify and deploy AI Studio GHRAB

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [app-updated, app_manifest_updated, school-apps-updated]
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ai-studio-pages
  cancel-in-progress: false

jobs:
  qa-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        timeout-minutes: 4
        run: npm ci --no-audit --no-fund
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
      - name: Synchronise application manifests
        if: github.event_name != 'pull_request'
        run: npm run sync
      - name: Normalize source formatting
        run: npm run format
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run GHRAB QA release gate
        run: npm run qa:release
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghrab-qa-${{ github.sha }}
          path: qa-results
      - uses: actions/configure-pages@v5
        if: github.event_name != 'pull_request'
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: dist

  qa-diagnostics:
    if: always()
    needs: qa-build
    runs-on: ubuntu-latest
    steps:
      - name: Download QA evidence
        uses: actions/download-artifact@v4
        with:
          name: ghrab-qa-${{ github.sha }}
          path: qa-results
      - name: Print compact QA diagnostics
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const reportPath = 'qa-results/qa-report.json';
          if (!fs.existsSync(reportPath)) {
            console.error('QA report missing.');
            process.exit(0);
          }
          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          console.log(`VERDICT ${report.verdict}`);
          for (const gate of report.gates || []) {
            console.log(`GATE ${gate.name}: ${gate.status} findings=${(gate.findings || []).length}`);
          }
          for (const item of report.blockerAndMajor || []) {
            console.log(`FINDING ${item.severity} ${item.gate} ${item.code}: ${item.message} | evidence=${item.evidence || ''}`);
          }
          NODE

  deploy:
    if: github.event_name != 'pull_request'
    needs: qa-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
