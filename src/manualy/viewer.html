<!doctype html>
<html lang="cs" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#030915" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; frame-src 'self' https://daniel22-dev.github.io; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>Manuál · AI Studio GHRAB</title>
    <link rel="manifest" href="../manifest.webmanifest" />
    <link rel="icon" href="../assets/brand/icon-32.png" sizes="32x32" />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../polish.css" />
    <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body
    class="manual-viewer-page"
    data-page="manual-viewer"
    data-base="../"
    data-title-cs="Manuál · AI Studio GHRAB"
    data-title-en="Manual · AI Studio GHRAB"
  >
    <a
      class="skip-link"
      href="#manual-frame"
      data-cs="Přejít na manuál"
      data-en="Skip to manual"
      >Přejít na manuál</a
    >
    <header class="manual-viewer-header">
      <a class="viewer-back" href="./" aria-label="Zpět na přehled manuálů"
        ><span aria-hidden="true">←</span
        ><span data-cs="Manuály" data-en="Manuals">Manuály</span></a
      >
      <div class="viewer-identity" aria-live="polite">
        <img
          id="viewer-icon"
          class="viewer-icon"
          src="../assets/brand/icon-48.png"
          alt=""
          width="42"
          height="42"
        />
        <div>
          <strong
            id="viewer-title"
            data-cs="Načítám manuál…"
            data-en="Loading manual…"
            >Načítám manuál…</strong
          ><small id="viewer-meta">AI Studio GHRAB</small>
        </div>
      </div>
      <div class="viewer-actions">
        <button
          id="viewer-reload"
          class="viewer-action"
          type="button"
          hidden
          data-cs="Obnovit"
          data-en="Reload"
        >
          Obnovit
        </button>
        <a
          id="viewer-external"
          class="viewer-action secondary"
          href="./"
          target="_blank"
          rel="noopener"
          hidden
          data-cs="Otevřít zvlášť"
          data-en="Open separately"
          >Otevřít zvlášť</a
        >
        <div class="header-actions">
          <div class="segmented" aria-label="Jazyk">
            <button type="button" data-lang="cs" aria-pressed="true">CZ</button
            ><button type="button" data-lang="en" aria-pressed="false">
              EN
            </button>
          </div>
        </div>
      </div>
    </header>
    <main id="viewer-main" class="manual-viewer-main">
      <section id="viewer-state" class="viewer-state" aria-live="polite">
        <div class="viewer-loader" aria-hidden="true"></div>
        <p
          id="viewer-state-title"
          class="viewer-state-title"
          data-cs="Připravuji manuál…"
          data-en="Preparing the manual…"
        >
          Připravuji manuál…
        </p>
        <p
          id="viewer-state-copy"
          data-cs="Ověřuji přístup a načítám aktuální verzi z aplikace."
          data-en="Checking access and loading the current version from the application."
        >
          Ověřuji přístup a načítám aktuální verzi z aplikace.
        </p>
        <div id="viewer-state-actions" class="viewer-state-actions"></div>
      </section>
      <iframe
        id="manual-frame"
        class="manual-frame"
        title="Interaktivní manuál"
        allow="fullscreen"
        allowfullscreen
        referrerpolicy="strict-origin-when-cross-origin"
        hidden
      ></iframe>
    </main>
    <script src="../app.js" type="module"></script>
    <script src="./viewer.js" type="module"></script>
  </body>
</html>
